name: Conan Build and Upload

on:
  workflow_call:
    inputs:
      version:
        description: Package version (e.g., 1.2.0 or 1.2.0-dev-abc1234)
        required: true
        type: string
      remote-name:
        description: Conan remote name to upload to (e.g., conan-rc or conan-stable)
        required: true
        type: string
      package-name:
        description: Conan package name
        required: false
        type: string
        default: numops
    secrets:
      remote-url:
        description: JFrog Artifactory Conan API base URL
        required: true
      remote-user:
        description: JFrog username or email
        required: true
      remote-token:
        description: JFrog access token
        required: true

jobs:
  build-upload:
    name: ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            profile: conan/profiles/linux-x86_64
          - os: macos-latest
            profile: conan/profiles/macos-armv8
          - os: windows-latest
            profile: conan/profiles/windows-x86_64

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Conan
        uses: skolobov/shared-workflows/actions/conan-setup@v1
        with:
          profile: ${{ matrix.profile }}
          cache-conan: "false"

      - name: Configure Conan remote
        uses: skolobov/shared-workflows/actions/conan-remote@v1
        with:
          remote-name: ${{ inputs.remote-name }}
          remote-url: ${{ secrets.remote-url }}
          remote-user: ${{ secrets.remote-user }}
          remote-token: ${{ secrets.remote-token }}

      - name: Build and upload package
        shell: bash
        run: |
          conan lock create . --version="${{ inputs.version }}" \
            --profile:host="${{ matrix.profile }}" \
            --profile:build="${{ matrix.profile }}" \
            --lockfile-out=conan.lock
          conan create . --version="${{ inputs.version }}" \
            --lockfile=conan.lock
          conan upload "${{ inputs.package-name }}/${{ inputs.version }}" \
            -r "${{ inputs.remote-name }}" --confirm
